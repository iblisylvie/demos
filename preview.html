<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>研发进度预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        margin: 0;
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      async function boot() {
        const response = await fetch("./研发进度初始版.txt");
        if (!response.ok) {
          throw new Error("无法读取 研发进度初始版.txt");
        }

        let source = await response.text();
        source = source.replace(
          /^import React, \{ useState, useRef, useEffect \} from "react";\s*/m,
          "const { useState, useRef, useEffect } = React;\n"
        );
        source = source.replace("export default function App()", "function App()");
        source += "\nconst root = ReactDOM.createRoot(document.getElementById('root'));\nroot.render(<App />);\n";

        const compiled = Babel.transform(source, {
          presets: ["react"],
          filename: "app.jsx",
        }).code;

        const script = document.createElement("script");
        script.text = compiled;
        document.body.appendChild(script);
      }

      boot().catch((error) => {
        const root = document.getElementById("root");
        root.innerHTML =
          '<div style="padding:24px;font:14px/1.6 sans-serif;color:#b91c1c;">预览启动失败：' +
          error.message +
          "</div>";
        console.error(error);
      });
    </script>
  </body>
</html>
